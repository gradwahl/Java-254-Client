name: Build JAR

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn --batch-mode clean package

      - uses: actions/upload-artifact@v4
        with:
          name: java-254-client
          path: |
            target/*.jar
            lib/

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/v')
        run: zip -r "java-254-client-${GITHUB_REF_NAME}.zip" target/*.jar lib/

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "java-254-client-${GITHUB_REF_NAME}.zip" --verify-tag --generate-notes
