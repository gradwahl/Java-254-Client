name: Build JAR

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # For tag builds, stamp the project version from the tag (v1.7 -> 1.7) so the jar's
      # Implementation-Version matches the release. Without this the manifest keeps the
      # hardcoded pom version and the updater re-downloads the same release forever.
      - name: Set release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: mvn --batch-mode versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DgenerateBackupPoms=false

      - name: Build
        run: mvn --batch-mode clean package

      - uses: actions/upload-artifact@v4
        with:
          name: Progressive-Java-Client
          path: Jar Output/Progressive-Java-Client-*.jar

      - name: Name release JAR
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp "Jar Output/"Progressive-Java-Client-*.jar "Progressive-Java-Client-${GITHUB_REF_NAME}.jar"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "Progressive-Java-Client-${GITHUB_REF_NAME}.jar" --verify-tag --generate-notes
